# Kashef — automatic daily product sync
#
# WHERE THIS GOES: save this file as .github/workflows/sync-products.yml
# in your Kashef repo (create the .github/workflows/ folders if they
# don't exist yet).
#
# WHAT IT DOES: runs sync-products.mjs on GitHub's servers, which
# re-fetches all stores' live catalogs and lists ONLY products that
# have a verified person-free (product-only) photo — site policy is
# that no human figure ever appears on Kashef. Products whose photos
# all contain a person stay hidden until the brand adds a
# product-only shot. Scan verdicts are cached in scan-cache.json so
# each product is only re-checked when its photos change. If anything
# changed, the run commits the updated files straight to your repo.
#
# ONE-TIME SETUP (~10 seconds):
# 1. Commit this file + sync-products.mjs to your repo.
# 2. Go to the "Actions" tab on GitHub.
# 3. Click "Sync Kashef products" in the left sidebar.
# 4. Click "Run workflow" once to confirm it works.
# After that, it just runs itself every 6 hours.

name: Sync Kashef products

on:
  schedule:
    # Runs every 6 hours (00:00, 06:00, 12:00, 18:00 UTC). Edit the cron
    # expression to change the cadence, e.g. "0 3 * * *" for once a day.
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      cutout_limit:
        description: "Max products to scan with the model this run (blank = 200). Use a small number like 10 to test."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install @xenova/transformers

      - name: Run product sync
        env:
          CUTOUT_LIMIT: ${{ github.event.inputs.cutout_limit }}
        run: node sync-products.mjs

      - name: Commit updated catalog (if anything changed)
        run: |
          git config user.name "kashef-sync-bot"
          git config user.email "actions@github.com"
          rm -rf cutouts
          git add -A -- synced-products.json kashef_9.html scan-cache.json cutouts
          git diff --cached --quiet && echo "No product changes today." || git commit -m "chore: sync store products [automated]"
          git push
